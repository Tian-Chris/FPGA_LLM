# =============================================================================
# connectivity.cfg — HBM Bank Mapping for Alveo U280
# =============================================================================
#
# Bank layout:
#   HBM[0:3] — Weight buffer (576 MB)
#   HBM[4]   — Activation buffer (16 MB)
#   HBM[5]   — Output buffer (4 MB)
#   (2 engines: hbm00-01 wgt, hbm06-07 act, hbm12 flush, hbm13 DMA)
#
# RTL address-space separation (verified in fsm_controller.v):
#   - Weight tile loaders (hbm00-05): ONLY read from weight_base + offset
#   - Activation tile loaders (hbm06-11): ONLY read from act_base + offset
#   - Flush (hbm12): ONLY writes to act_base + offset
#   - DMA (hbm13): reads LN params from weight_base, skip data from act_base,
#     writes output to output_base → needs all three regions
#
# Crossbar: 37 paths (down from 196 with full [0:13] on all ports)
# =============================================================================

[connectivity]
# Weight tile loaders (2x) — weight banks only
sp=fpga_kernel_1.m_axi_hbm00:HBM[0:3]
sp=fpga_kernel_1.m_axi_hbm01:HBM[0:3]

# Activation tile loaders (2x) — activation bank only
sp=fpga_kernel_1.m_axi_hbm06:HBM[4]
sp=fpga_kernel_1.m_axi_hbm07:HBM[4]

# Flush (write-only) — activation bank only
sp=fpga_kernel_1.m_axi_hbm12:HBM[4]

# DMA (read+write) — bridges weight, activation, and output banks
sp=fpga_kernel_1.m_axi_hbm13:HBM[0:5]
